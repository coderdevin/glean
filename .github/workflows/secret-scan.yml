name: Secret scan

# Run gitleaks on every push and pull request. This is the authoritative
# check — the local .husky/pre-commit hook is a fast preview but contributors
# can skip it (--no-verify) or not have gitleaks installed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual re-runs from the Actions tab.
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a newer commit lands —
# we only care about the latest state.
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for PR diff scans)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 lets gitleaks scan the full history on push events
          # and the full PR diff on pull_request events. Cost on a small repo
          # is negligible; the benefit is catching anything earlier commits
          # snuck in.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # The action posts a summary to the run; no extra config needed.
          # Set GITLEAKS_LICENSE only if this repo is owned by an org (free
          # for personal use; orgs need a free key from gitleaks.io).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
